<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}2000 Hours{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand__dot"></span>
                <span class="brand__name">2000 Hours</span>
            </a>
            <nav class="site-nav">
                {% if session.get('strava_token') %}
                    {% if athlete_profile %}
                        <img src="{{ athlete_profile }}" alt="" class="avatar" />
                    {% endif %}
                    <span class="athlete-name">{{ athlete_name or 'Athlete' }}</span>
                    <form action="{{ url_for('refresh') }}" method="post" class="inline-form">
                        <button type="submit" class="btn btn--ghost">Refresh</button>
                    </form>
                    <a href="{{ url_for('logout') }}" class="btn btn--ghost">Log out</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <span>Goal: 2000 hours of sport · Jan 1, 2025 – Dec 31, 2034</span>
    </footer>
</body>
</html>
